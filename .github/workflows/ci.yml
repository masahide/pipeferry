name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - run: go test -race ./...
      - run: go vet ./...
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /tmp/pipeferry ./cmd/pipeferry

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - run: go build -o "$env:RUNNER_TEMP\pipeferry.exe" ./cmd/pipeferry

  cross-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o /tmp/pipeferry.exe ./cmd/pipeferry
